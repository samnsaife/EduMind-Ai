      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=100 --ignore=E501,W503 || true

      - name: Run tests
        env:
          GROQ_API_KEY: ""
        run: pytest tests/ -v --tb=short

      - name: Test backend startup (import check)
        run: python -c "from backend.services.predict_service import predict_service; predict_service.warmup(); print('✅ PredictService OK')"
